<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f172a">
    <title>Invest Dashboard - Premium Financial Analytics</title>
    
    <!-- SEO & Metadata -->
    <meta name="description" content="Tableau de bord financier premium pour le suivi de portefeuille boursier en temps réel.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>

    <style>
        :root {
            /* UI UX Pro Max - Premium Design System */
            --bg-main: #0b1120;
            --bg-card: rgba(30, 41, 59, 0.6);
            --accent-primary: #38bdf8;
            --accent-secondary: #818cf8;
            --accent-glow: rgba(56, 189, 248, 0.3);
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --positive: #10b981;
            --negative: #f43f5e;
            --positive-bg: rgba(16, 185, 129, 0.1);
            --negative-bg: rgba(244, 63, 94, 0.1);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: 16px;
            --radius-bento: 24px;
            --transition-pro: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .positive { color: var(--positive) !important; }
        .negative { color: var(--negative) !important; }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-main);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(129, 140, 248, 0.03) 0%, transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            padding-bottom: 50px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* Header & Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 0;
            margin-bottom: 20px;
        }

        .brand h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.8px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .actions {
            display: flex;
            gap: 16px;
            align-items: center;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-pro);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(8px);
        }

        .btn-primary {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text-main);
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-2px);
            border-color: rgba(255, 255, 255, 0.15);
        }

        .btn-refresh {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: #000;
            border: none;
            font-weight: 700;
        }

        .btn-refresh:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px var(--accent-glow);
            filter: brightness(1.1);
        }

        /* Tabs System */
        .tabs-header {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.02);
            padding: 6px;
            border-radius: 16px;
            width: fit-content;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
        }

        .tab-trigger {
            padding: 10px 28px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-dim);
            cursor: pointer;
            transition: var(--transition-pro);
        }

        .tab-trigger.active {
            background: rgba(255, 255, 255, 0.06);
            color: var(--text-main);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        /* Dashboard Overview Grid - Bento Style */
        .overview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        @media (max-width: 640px) {
            .overview-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .overview-grid .stat-card:last-child {
                grid-column: span 2;
            }
        }

        .stat-card {
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-bento);
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: var(--transition-pro);
        }

        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(40, 52, 74, 0.7);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.02), transparent);
            pointer-events: none;
        }

        .stat-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
        }

        .stat-value {
            font-size: 26px;
            font-weight: 800;
            color: var(--text-main);
            margin-bottom: 14px;
            letter-spacing: -0.5px;
        }

        .stat-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }

        .stat-badge.up { color: var(--positive); background: var(--positive-bg); }
        .stat-badge.down { color: var(--negative); background: var(--negative-bg); }

        /* Content Sections */
        .main-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
        }

        .section {
            background: var(--bg-card);
            backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-bento);
            padding: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            letter-spacing: -0.3px;
        }

        /* Assets Grid - Bento Style */
        .assets-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 16px;
        }

        @media (max-width: 480px) {
            .assets-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .asset-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px 16px;
            transition: var(--transition-pro);
            cursor: pointer;
            text-align: center;
            position: relative;
        }

        .asset-card:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: scale(1.03) translateY(-4px);
            border-color: var(--accent-primary);
            box-shadow: 0 12px 24px -10px var(--accent-glow);
        }

        .asset-card:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.02);
            border-color: var(--accent-primary);
        }

        .asset-card.active {
            border-color: var(--accent-primary);
            background: rgba(56, 189, 248, 0.05);
        }

        .asset-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 6px;
            color: var(--accent-primary);
        }

        .asset-price {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        /* Table Styles */
        .table-wrapper {
            overflow-x: auto;
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            text-align: left;
            padding: 16px;
            color: var(--text-dim);
            font-weight: 600;
            border-bottom: 1px solid var(--glass-border);
        }

        td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.02);
        }

        tr:last-child td { border: none; }

        .ticker-style {
            font-weight: 700;
            color: var(--accent-primary);
        }

        /* Loading & State */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 100px 0;
            color: var(--text-dim);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(56, 189, 248, 0.1);
            border-top-color: var(--accent-primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .last-update {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 4px;
        }

        /* Chart Customization */
        canvas {
            max-width: 100%;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .modal-card {
            background: #111927;
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-bento);
            padding: 36px;
            width: 90%;
            max-width: 560px;
            max-height: 92vh;
            overflow-y: auto;
            transform: translateY(24px) scale(0.97);
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal-overlay.active .modal-card {
            transform: translateY(0) scale(1);
        }
        .modal-title {
            font-size: 20px;
            font-weight: 800;
            margin-bottom: 28px;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }
        @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.full { grid-column: span 2; }
        @media (max-width: 480px) { .form-group.full { grid-column: span 1; } }
        .form-label {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .form-input, .form-select {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 12px 16px;
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }
        .form-input:focus, .form-select:focus {
            border-color: var(--accent-primary);
            background: rgba(56, 189, 248, 0.04);
        }
        .form-select option { background: #1e293b; color: var(--text-main); }
        .calc-preview {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 24px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        .calc-item { display: flex; flex-direction: column; gap: 4px; }
        .calc-label {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
        .calc-value { font-size: 16px; font-weight: 700; color: var(--text-main); }
        .modal-actions { display: flex; gap: 12px; justify-content: flex-end; }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px 24px;
            font-size: 14px;
            font-weight: 600;
            z-index: 2000;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.active { transform: translateY(0); opacity: 1; }
        .toast.success { border-color: var(--positive); color: var(--positive); }
        .toast.error { border-color: var(--negative); color: var(--negative); }

        /* Settings block in Ventes tab */
        .settings-block {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }
        .settings-toggle {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        .settings-inner { margin-top: 18px; display: none; }
        .settings-inner.open { display: block; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="brand">
            <h1><span style="font-size: 1.2em">💎</span> MA BOURSE <span style="font-size: 0.6em; opacity: 0.5; font-weight: 400">PREMIUM</span></h1>
            <div id="lastUpdate" class="last-update">Initialisation en cours...</div>
        </div>
        <div class="actions">
            <button class="btn btn-primary" onclick="window.open('https://docs.google.com/spreadsheets/d/19mqJneAZsFcTkoHAgxs6c8nUbRHgSYttmU4X1borF0s/')">
                <span>📂</span> Source
            </button>
            <button class="btn btn-refresh" onclick="refreshAll()">
                <span>🔄</span> Actualiser
            </button>
        </div>
    </header>

    <div class="tabs-header">
        <div class="tab-trigger active" id="tab-cours" onclick="switchTab('cours')">Marché</div>
        <div class="tab-trigger" id="tab-portfolio" onclick="switchTab('portfolio')">Mon Portefeuille</div>
        <div class="tab-trigger" id="tab-ventes" onclick="switchTab('ventes')">Ventes</div>
    </div>

    <!-- Overview Stats -->
    <div id="overview-stats" class="overview-grid">
        <!-- Will be populated by JS -->
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Active View -->
        <div id="view-content" class="section">
            <div class="loading">
                <div class="spinner"></div>
                <p>Récupération des données en temps réel...</p>
            </div>
        </div>

        <!-- Sidebar / Chart Section -->
        <div class="section">
            <div class="section-header">
                <h2 class="section-title">Analyse d'Allocation</h2>
            </div>
            <div style="height: 300px; display: flex; align-items: center; justify-content: center;">
                <canvas id="allocationChart"></canvas>
            </div>
            <div id="allocation-details" style="margin-top: 20px">
                <!-- Details list -->
            </div>
        </div>
    </div>
</div>

<script>
    const CONFIG = {
        SHEET_ID: '19mqJneAZsFcTkoHAgxs6c8nUbRHgSYttmU4X1borF0s',
        SHEETS: {
            COURS: 'Cours_Quotidien',
            PORTFOLIO: 'BD',
            VENTES: 'Ventes'
        }
    };

    let state = {
        currentTab: 'cours',
        coursData: [],
        portfolioData: [],
        ventesData: [],
        lastUpdate: null,
        mainChart: null,
        appsScriptUrl: localStorage.getItem('appsScriptUrl') || ''
    };

    function formatNumber(num, decimals = 2) {
        if (num === null || isNaN(num)) return '-';
        let formatted = new Intl.NumberFormat('fr-FR', {
            minimumFractionDigits: decimals,
            maximumFractionDigits: decimals
        }).format(num);
        // Ensure space as thousand separator (Intl fr-FR uses non-breaking space)
        return formatted.replace(/\u00a0/g, ' ').replace(/\u202f/g, ' ');
    }

    async function fetchData(sheetName) {
        const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&sheet=${sheetName}`;
        try {
            const response = await fetch(url);
            const text = await response.text();
            const data = JSON.parse(text.substring(47, text.length - 2));
            return data.table;
        } catch (e) {
            console.error(`Erreur lors du chargement de ${sheetName}:`, e);
            return null;
        }
    }

    function processTable(table) {
        const headers = table.cols.map(c => c.label || '');
        return table.rows.map(r => {
            const row = { _raw: r }; // Support for formatted values
            r.c.forEach((cell, i) => {
                if (headers[i]) {
                    row[headers[i]] = cell ? cell.v : null;
                    row[`${headers[i]}_formatted`] = cell ? cell.f : null;
                }
            });
            return row;
        });
    }

    async function refreshAll() {
        const [coursTable, portfolioTable, ventesTable] = await Promise.all([
            fetchData(CONFIG.SHEETS.COURS),
            fetchData(CONFIG.SHEETS.PORTFOLIO),
            fetchData(CONFIG.SHEETS.VENTES)
        ]);

        if (coursTable) state.coursData = processTable(coursTable);
        if (portfolioTable) state.portfolioData = processTable(portfolioTable);
        if (ventesTable) state.ventesData = processTable(ventesTable).filter(r => r['Désignation']);

        state.lastUpdate = new Date();
        render();
    }

    function switchTab(tab) {
        state.currentTab = tab;
        document.querySelectorAll('.tab-trigger').forEach(el => el.classList.remove('active'));
        document.getElementById(`tab-${tab}`).classList.add('active');
        render();
    }

    function render() {
        renderOverview();
        renderMainContent();
        renderCharts();
    }

    function renderOverview() {
        const container = document.getElementById('overview-stats');
        
        let totalInvesti = 0;
        let totalValo = 0;
        
        state.portfolioData.forEach(item => {
            const nb = parseFloat(item['Nb'] || 0);
            const cours = parseFloat(item['Cours.Act'] || 0);
            const investi = parseFloat(item['Mt_Investi'] || 0);
            
            totalInvesti += investi;
            totalValo += (nb * cours);
        });

        const totalGain = totalValo - totalInvesti;
        const gainPercent = totalInvesti > 0 ? (totalGain / totalInvesti) * 100 : 0;

        let gainRealise = 0;
        state.ventesData.forEach(v => { gainRealise += parseFloat(v['Gain/Perte (DH)'] || 0); });

        container.innerHTML = `
            <div class="stat-card">
                <div class="stat-label">Valeur Portefeuille</div>
                <div class="stat-value ${totalValo < 0 ? 'negative' : ''}">${formatNumber(totalValo)} MAD</div>
                <div class="stat-badge ${totalGain >= 0 ? 'up' : 'down'}">
                    ${totalGain >= 0 ? '▲' : '▼'} ${formatNumber(totalGain)} (${formatNumber(gainPercent)}%)
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Investi Total</div>
                <div class="stat-value ${totalInvesti < 0 ? 'negative' : ''}">${formatNumber(totalInvesti)} MAD</div>
                <div class="stat-badge up" style="background: rgba(56, 189, 248, 0.1); color: var(--accent-primary)">
                    ACTIFS SOUS GESTION
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Performance Globale</div>
                <div class="stat-value ${gainPercent < 0 ? 'negative' : ''}">${formatNumber(gainPercent)}%</div>
                <div class="stat-badge ${gainPercent >= 0 ? 'up' : 'down'}">
                     ${gainPercent >= 0 ? 'PROGRESSION' : 'REPLI'}
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Gains Réalisés (Ventes)</div>
                <div class="stat-value ${gainRealise < 0 ? 'negative' : ''}">${formatNumber(gainRealise)} MAD</div>
                <div class="stat-badge ${gainRealise >= 0 ? 'up' : 'down'}">
                    ${state.ventesData.length} VENTE${state.ventesData.length !== 1 ? 'S' : ''} CLÔTURÉE${state.ventesData.length !== 1 ? 'S' : ''}
                </div>
            </div>
        `;
    }

    function createTableHtml(title, data) {
        let totalInvesti = 0;
        let totalValo = 0;
        let totalGain = 0;

        let html = `
            <div class="section-header" style="margin-top: 30px">
                <h2 class="section-title">${title}</h2>
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Titre</th>
                            <th>Qté</th>
                            <th>PUMP</th>
                            <th>Cours</th>
                            <th>Valo.</th>
                            <th>Gains</th>
                            <th>% Evol.</th>
                        </tr>
                    </thead>
                    <tbody>
        `;

        data.forEach(row => {
            const design = row['Désignation'] || '';
            const nb = parseFloat(row['Nb'] || 0);
            const pmp = parseFloat(row['P.Unitaire'] || 0);
            const cours = parseFloat(row['Cours.Act'] || 0);
            const investi = parseFloat(row['Mt_Investi'] || 0);
            const valorise = nb * cours;
            const gain = valorise - investi;
            const gainPercent = investi > 0 ? (gain / investi) * 100 : 0;
            const isPositive = gain >= 0;

            totalInvesti += investi;
            totalValo += valorise;
            totalGain += gain;

            html += `
                <tr>
                    <td class="ticker-style">${design}</td>
                    <td>${formatNumber(nb, 0)}</td>
                    <td style="color: var(--text-dim)">${formatNumber(pmp)}</td>
                    <td style="font-weight:600">${formatNumber(cours)}</td>
                    <td style="font-weight:700">${formatNumber(valorise)}</td>
                    <td class="${isPositive ? 'positive' : 'negative'}">
                        ${gain < 0 ? '' : '+'}${formatNumber(gain)}
                    </td>
                    <td>
                        <span class="stat-badge ${isPositive ? 'up' : 'down'}" style="font-size: 11px">
                            ${isPositive ? '▲' : '▼'} ${formatNumber(gainPercent)}%
                        </span>
                    </td>
                </tr>
            `;
        });

        const isGlobalPositive = totalGain >= 0;
        const globalGainPercent = totalInvesti > 0 ? (totalGain / totalInvesti) * 100 : 0;

        html += `
                    </tbody>
                    <tfoot>
                        <tr style="background: rgba(255,255,255,0.05); font-weight: 800; border-top: 2px solid var(--accent-primary)">
                            <td>TOTAL</td>
                            <td>-</td>
                            <td>-</td>
                            <td>-</td>
                            <td>${formatNumber(totalValo)}</td>
                            <td class="${isGlobalPositive ? 'positive' : 'negative'}">
                                ${totalGain < 0 ? '' : '+'}${formatNumber(totalGain)}
                            </td>
                            <td>
                                <span class="stat-badge ${isGlobalPositive ? 'up' : 'down'}" style="font-size: 11px">
                                    ${formatNumber(globalGainPercent)}%
                                </span>
                            </td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        `;
        return html;
    }

    function renderMainContent() {
        const container = document.getElementById('view-content');
        
        if (state.currentTab === 'cours') {
            const latest = state.coursData[state.coursData.length - 1] || {};
            const previous = state.coursData[state.coursData.length - 2] || {};
            const tickers = ['AKDITAL', 'ALLIANCE', 'TGCC', 'ENNAKL', 'SGTM', 'IAM', 'MED PAPER'];
            
            // Extract Date and Hour
            const dateStr = latest['DATE_formatted'] || latest['DATE'] || '';
            const heureStr = latest['HEURE'] || '';

            let html = `
                <div class="section-header">
                    <div>
                        <h2 class="section-title">Derniers Cours Marché</h2>
                        <div class="last-update" style="color: var(--accent-primary); font-weight: 600; margin-top: 4px">
                            📅 ${dateStr} &nbsp; 🕒 ${heureStr}
                        </div>
                    </div>
                </div>
                <div class="assets-grid">
            `;
            
            tickers.forEach(t => {
                if (latest[t] !== undefined) {
                    let variationHtml = '';
                    const currentVal = parseFloat(latest[t]);
                    const prevVal = previous && previous[t] ? parseFloat(previous[t]) : null;
                    
                    if (prevVal && prevVal !== 0) {
                        const variation = ((currentVal - prevVal) / prevVal) * 100;
                        const isUp = variation >= 0;
                        variationHtml = `
                            <div class="stat-badge ${isUp ? 'up' : 'down'}" style="margin-top: 10px; font-size: 11px; padding: 4px 8px">
                                ${isUp ? '▲' : '▼'} ${variation.toFixed(2)}%
                            </div>
                        `;
                    } else {
                        variationHtml = `<div class="last-update">MAD / Action</div>`;
                    }

                    html += `
                        <div class="asset-card">
                            <div class="asset-name">${t}</div>
                            <div class="asset-price ${currentVal < 0 ? 'negative' : ''}">${formatNumber(currentVal)}</div>
                            ${variationHtml}
                        </div>
                    `;
                }
            });
            html += `</div>`;
            container.innerHTML = html;
        } else if (state.currentTab === 'portfolio') {
            // Portfolio View - Split Actions and OPCVM
            const actions = state.portfolioData.filter(row => {
                const type = (row['Type'] || '').toUpperCase();
                const design = (row['Désignation'] || '').toUpperCase();
                return type === 'ACTION' || (!type.includes('OPCVM') && !design.includes('OPCVM'));
            });
            
            const opcvm = state.portfolioData.filter(row => {
                const type = (row['Type'] || '').toUpperCase();
                const design = (row['Désignation'] || '').toUpperCase();
                return type.includes('OPCVM') || design.includes('OPCVM');
            });

            container.innerHTML = createTableHtml('Actions', actions) + createTableHtml('OPCVM', opcvm);
        } else if (state.currentTab === 'ventes') {
            renderVentesTab();
        }
    }

    function renderCharts() {
        const canvas = document.getElementById('allocationChart');
        if (!canvas) return;
        const ctx = canvas.getContext('2d');
        
        const labels = [];
        const data = [];
        const colors = ['#38bdf8', '#818cf8', '#34d399', '#fb7185', '#fbbf24', '#a78bfa', '#4ade80', '#06b6d4', '#6366f1'];

        state.portfolioData.forEach(item => {
            const design = item['Désignation'];
            const valo = (parseFloat(item['Nb'] || 0) * parseFloat(item['Cours.Act'] || 0));
            if (design && valo > 0) {
                labels.push(design);
                data.push(valo);
            }
        });

        const total = data.reduce((a, b) => a + b, 0);

        if (state.mainChart) state.mainChart.destroy();

        // Ensure plugin is registered
        Chart.register(ChartDataLabels);

        state.mainChart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: labels,
                datasets: [{
                    data: data,
                    backgroundColor: colors,
                    borderColor: 'rgba(15, 23, 42, 1)',
                    borderWidth: 4,
                    hoverOffset: 20
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    datalabels: {
                        color: '#fff',
                        formatter: (value, ctx) => {
                            let percentage = (value * 100 / total).toFixed(1) + "%";
                            return percentage;
                        },
                        font: { weight: 'bold', size: 10 },
                        display: 'auto',
                        anchor: 'center'
                    },
                    tooltip: {
                        callbacks: {
                            label: (context) => {
                                const val = context.raw;
                                const pct = ((val / total) * 100).toFixed(1);
                                return `${context.label}: ${formatNumber(val)} MAD (${pct}%)`;
                            }
                        }
                    }
                },
                cutout: '70%',
                animation: { animateScale: true }
            }
        });

        // Detail Legend with %
        const detailsContainer = document.getElementById('allocation-details');
        let detailHtml = '';
        labels.forEach((label, i) => {
            const percent = ((data[i] / total) * 100).toFixed(1);
            detailHtml += `
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 13px">
                    <div style="display: flex; align-items: center; gap: 8px">
                        <div style="width: 10px; height: 10px; border-radius: 2px; background: ${colors[i % colors.length]}"></div>
                        <span style="font-weight: 500">${label}</span>
                    </div>
                    <span style="font-weight: 700; color: var(--accent-primary)">${percent}%</span>
                </div>
            `;
        });
        detailsContainer.innerHTML = detailHtml;
    }

    // ── Ventes Tab ──────────────────────────────────────────────────────────

    function renderVentesTab() {
        const container = document.getElementById('view-content');
        const connected = !!state.appsScriptUrl;

        let html = `
            <div class="section-header">
                <h2 class="section-title">Historique des Ventes</h2>
                <button class="btn btn-refresh" onclick="openVenteModal()" style="font-size:13px;padding:10px 20px">
                    + Nouvelle Vente
                </button>
            </div>

            <div class="settings-block">
                <div class="settings-toggle" onclick="toggleSettings()">
                    <span style="font-size:13px;color:var(--text-dim)">⚙️ Configuration Apps Script</span>
                    <span style="font-size:12px;color:${connected ? 'var(--positive)' : 'var(--negative)'}">
                        ${connected ? '● Connecté' : '● Non configuré'}
                    </span>
                </div>
                <div class="settings-inner" id="settings-inner">
                    <div class="form-group" style="margin-bottom:12px">
                        <label class="form-label">URL du Web App Google Apps Script</label>
                        <input type="url" class="form-input" id="apps-script-url"
                               value="${state.appsScriptUrl}"
                               placeholder="https://script.google.com/macros/s/.../exec">
                    </div>
                    <div style="display:flex;align-items:center;gap:12px">
                        <button class="btn btn-refresh" onclick="saveAppsScriptUrl()" style="font-size:12px;padding:8px 18px">
                            Enregistrer
                        </button>
                        <span style="font-size:12px;color:var(--text-dim)">
                            Déployez un Web App depuis Extensions → Apps Script dans votre Google Sheet
                        </span>
                    </div>
                </div>
            </div>
        `;

        if (state.ventesData.length === 0) {
            html += `<div style="text-align:center;padding:50px 0;color:var(--text-dim)">Aucune vente enregistrée</div>`;
        } else {
            let totalInvesti = 0, totalPercu = 0, totalGain = 0;

            html += `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Titre</th>
                                <th>Qté</th>
                                <th>PUMP</th>
                                <th>Cours Vente</th>
                                <th>Investi</th>
                                <th>Perçu</th>
                                <th>Gain/Perte</th>
                                <th>%</th>
                                <th>Statut</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            state.ventesData.forEach(row => {
                const date    = row['Date Vente_formatted'] || row['Date Vente'] || '';
                const design  = row['Désignation'] || '';
                const qte     = parseFloat(row['Qté Vendue'] || 0);
                const pump    = parseFloat(row['Cours Achat Moyen (DH)'] || 0);
                const cv      = parseFloat(row['Cours Vente (DH)'] || 0);
                const investi = parseFloat(row['Montant Investi (DH)'] || 0);
                const percu   = parseFloat(row['Montant Perçu (DH)'] || 0);
                const gain    = parseFloat(row['Gain/Perte (DH)'] || 0);
                const gainPct = parseFloat(row['Gain/Perte (%)'] || 0);
                const statut  = row['Statut'] || 'Clôturé';
                const pos     = gain >= 0;

                totalInvesti += investi;
                totalPercu   += percu;
                totalGain    += gain;

                html += `
                    <tr>
                        <td style="color:var(--text-dim);font-size:13px">${date}</td>
                        <td class="ticker-style">${design}</td>
                        <td>${formatNumber(qte, 0)}</td>
                        <td style="color:var(--text-dim)">${formatNumber(pump)}</td>
                        <td style="font-weight:600">${formatNumber(cv)}</td>
                        <td>${formatNumber(investi)}</td>
                        <td style="font-weight:600">${formatNumber(percu)}</td>
                        <td class="${pos ? 'positive' : 'negative'}" style="font-weight:700">
                            ${gain >= 0 ? '+' : ''}${formatNumber(gain)}
                        </td>
                        <td>
                            <span class="stat-badge ${pos ? 'up' : 'down'}" style="font-size:11px">
                                ${pos ? '▲' : '▼'} ${formatNumber(Math.abs(gainPct))}%
                            </span>
                        </td>
                        <td style="font-size:12px;color:var(--text-dim)">${statut}</td>
                    </tr>
                `;
            });

            const posTotal  = totalGain >= 0;
            const totalPct  = totalInvesti > 0 ? (totalGain / totalInvesti) * 100 : 0;

            html += `
                        </tbody>
                        <tfoot>
                            <tr style="background:rgba(255,255,255,0.05);font-weight:800;border-top:2px solid var(--accent-primary)">
                                <td colspan="5">TOTAL VENTES</td>
                                <td>${formatNumber(totalInvesti)}</td>
                                <td style="font-weight:700">${formatNumber(totalPercu)}</td>
                                <td class="${posTotal ? 'positive' : 'negative'}">
                                    ${totalGain >= 0 ? '+' : ''}${formatNumber(totalGain)}
                                </td>
                                <td>
                                    <span class="stat-badge ${posTotal ? 'up' : 'down'}" style="font-size:11px">
                                        ${formatNumber(Math.abs(totalPct))}%
                                    </span>
                                </td>
                                <td></td>
                            </tr>
                        </tfoot>
                    </table>
                </div>
            `;
        }

        container.innerHTML = html;
    }

    function toggleSettings() {
        const el = document.getElementById('settings-inner');
        if (el) el.classList.toggle('open');
    }

    function saveAppsScriptUrl() {
        const url = (document.getElementById('apps-script-url').value || '').trim();
        state.appsScriptUrl = url;
        localStorage.setItem('appsScriptUrl', url);
        showToast('URL enregistrée', 'success');
        renderVentesTab();
    }

    // ── Vente Modal ──────────────────────────────────────────────────────────

    function openVenteModal() {
        const select = document.getElementById('vente-designation');
        select.innerHTML = '<option value="">Sélectionner...</option>';
        state.portfolioData.forEach(item => {
            const design = item['Désignation'];
            if (design) {
                const opt = document.createElement('option');
                opt.value = design;
                opt.textContent = design;
                opt.dataset.pump = item['P.Unitaire'] || '';
                select.appendChild(opt);
            }
        });

        const today = new Date().toISOString().split('T')[0];
        document.getElementById('vente-date').value = today;
        document.getElementById('vente-qte').value = '';
        document.getElementById('vente-cours-achat').value = '';
        document.getElementById('vente-cours-vente').value = '';
        ['prev-investi','prev-percu','prev-gain','prev-percent'].forEach(id => {
            const el = document.getElementById(id);
            el.textContent = '—';
            el.className = 'calc-value';
        });

        document.getElementById('venteModal').classList.add('active');
    }

    function closeVenteModal() {
        document.getElementById('venteModal').classList.remove('active');
    }

    function handleOverlayClick(e) {
        if (e.target === e.currentTarget) closeVenteModal();
    }

    function onDesignationChange() {
        const select = document.getElementById('vente-designation');
        const pump = select.options[select.selectedIndex]?.dataset?.pump;
        if (pump) {
            document.getElementById('vente-cours-achat').value = parseFloat(pump).toFixed(2);
            calculateVente();
        }
    }

    function calculateVente() {
        const qte        = parseFloat(document.getElementById('vente-qte').value) || 0;
        const coursAchat = parseFloat(document.getElementById('vente-cours-achat').value) || 0;
        const coursVente = parseFloat(document.getElementById('vente-cours-vente').value) || 0;

        const investi = qte * coursAchat;
        const percu   = qte * coursVente;
        const gain    = percu - investi;
        const pct     = investi > 0 ? (gain / investi) * 100 : 0;

        document.getElementById('prev-investi').textContent = investi ? formatNumber(investi) + ' DH' : '—';
        document.getElementById('prev-percu').textContent   = percu   ? formatNumber(percu)   + ' DH' : '—';

        const gainEl = document.getElementById('prev-gain');
        gainEl.textContent = investi ? (gain >= 0 ? '+' : '') + formatNumber(gain) + ' DH' : '—';
        gainEl.className   = 'calc-value ' + (investi ? (gain >= 0 ? 'positive' : 'negative') : '');

        const pctEl = document.getElementById('prev-percent');
        pctEl.textContent = investi ? (pct >= 0 ? '+' : '') + formatNumber(pct) + '%' : '—';
        pctEl.className   = 'calc-value ' + (investi ? (pct >= 0 ? 'positive' : 'negative') : '');
    }

    async function submitVente() {
        const date       = document.getElementById('vente-date').value;
        const design     = document.getElementById('vente-designation').value;
        const qte        = parseFloat(document.getElementById('vente-qte').value);
        const coursAchat = parseFloat(document.getElementById('vente-cours-achat').value);
        const coursVente = parseFloat(document.getElementById('vente-cours-vente').value);

        if (!date || !design || !qte || !coursAchat || !coursVente) {
            showToast('Veuillez remplir tous les champs', 'error');
            return;
        }

        if (!state.appsScriptUrl) {
            showToast('URL Apps Script non configurée — onglet Ventes ⚙️', 'error');
            return;
        }

        const investi  = Math.round(qte * coursAchat * 100) / 100;
        const percu    = Math.round(qte * coursVente * 100) / 100;
        const gain     = Math.round((percu - investi) * 100) / 100;
        const gainPct  = investi > 0 ? Math.round((gain / investi) * 10000) / 100 : 0;

        const [y, m, d] = date.split('-');
        const payload = {
            dateVente:       `${d}/${m}/${y}`,
            designation:     design,
            qteVendue:       qte,
            coursAchat:      coursAchat,
            coursVente:      coursVente,
            montantInvesti:  investi,
            montantPercu:    percu,
            gainPerte:       gain,
            gainPertePercent: gainPct,
            statut:          'Clôturé'
        };

        const btn = document.getElementById('btn-submit-vente');
        btn.disabled = true;
        btn.textContent = 'Envoi...';

        try {
            await fetch(state.appsScriptUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            });
            showToast('Vente enregistrée avec succès !', 'success');
            closeVenteModal();
            setTimeout(refreshAll, 2000);
        } catch (e) {
            showToast('Erreur lors de l\'envoi', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Enregistrer';
        }
    }

    function showToast(msg, type = 'success') {
        const toast = document.getElementById('toast');
        toast.textContent = (type === 'success' ? '✓  ' : '✗  ') + msg;
        toast.className = `toast ${type} active`;
        setTimeout(() => toast.classList.remove('active'), 4000);
    }

    // Init
    window.onload = refreshAll;
</script>
<!-- Vente Modal -->
<div class="modal-overlay" id="venteModal" onclick="handleOverlayClick(event)">
    <div class="modal-card">
        <div class="modal-title">Enregistrer une Vente</div>
        <div class="form-grid">
            <div class="form-group">
                <label class="form-label">Date de Vente</label>
                <input type="date" class="form-input" id="vente-date">
            </div>
            <div class="form-group">
                <label class="form-label">Désignation</label>
                <select class="form-select" id="vente-designation" onchange="onDesignationChange()">
                    <option value="">Sélectionner...</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Quantité Vendue</label>
                <input type="number" class="form-input" id="vente-qte" min="1" step="1" oninput="calculateVente()">
            </div>
            <div class="form-group">
                <label class="form-label">Cours Achat Moyen (DH)</label>
                <input type="number" class="form-input" id="vente-cours-achat" step="0.01" oninput="calculateVente()">
            </div>
            <div class="form-group full">
                <label class="form-label">Cours de Vente (DH)</label>
                <input type="number" class="form-input" id="vente-cours-vente" step="0.01" oninput="calculateVente()">
            </div>
        </div>

        <div class="calc-preview">
            <div class="calc-item">
                <span class="calc-label">Montant Investi</span>
                <span class="calc-value" id="prev-investi">—</span>
            </div>
            <div class="calc-item">
                <span class="calc-label">Montant Perçu</span>
                <span class="calc-value" id="prev-percu">—</span>
            </div>
            <div class="calc-item">
                <span class="calc-label">Gain / Perte</span>
                <span class="calc-value" id="prev-gain">—</span>
            </div>
            <div class="calc-item">
                <span class="calc-label">Performance</span>
                <span class="calc-value" id="prev-percent">—</span>
            </div>
        </div>

        <div class="modal-actions">
            <button class="btn btn-primary" onclick="closeVenteModal()">Annuler</button>
            <button class="btn btn-refresh" id="btn-submit-vente" onclick="submitVente()">Enregistrer</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

</body>
</html>
